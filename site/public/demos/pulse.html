<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pulse · simulated demo</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F6F4;--surface:#fff;--ink:#16181A;--muted:#5B6470;--line:#E2E6E2;
    --signal:#0E9E6E;--signal-deep:#0A6B4B;--warn:#C8861A;--danger:#C24255;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:14px}
  .disp{font-family:"Space Grotesk",sans-serif}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
  .bar{
    position:sticky;top:0;z-index:20;background:rgba(244,246,244,.92);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:12px 20px;flex-wrap:wrap;
  }
  .logo{display:flex;align-items:center;gap:8px}
  .logo svg{width:34px;height:18px}
  .logo b{font-family:"Space Grotesk",sans-serif;font-size:16px}
  .logo span{color:var(--muted);font-size:12px}
  .bar input{
    font:inherit;font-size:13px;padding:7px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;outline:none;width:180px;
  }
  .bar input:focus{border-color:var(--signal)}
  .run{
    font:inherit;font-weight:700;font-size:13px;padding:8px 16px;border:0;border-radius:9px;
    background:var(--signal);color:#fff;cursor:pointer;white-space:nowrap;
  }
  .run:disabled{opacity:.75}
  .status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--signal)}
  .dot.sweeping{background:var(--warn);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.35}}
  .bar .grow{flex:1}
  .bar .chip{font-size:11px;font-weight:600;color:#0A6B4B;background:#dcefe6;border-radius:99px;padding:3px 10px}
  .bar a{font-size:12px;color:var(--muted);text-decoration:none}
  #progress{position:absolute;left:0;bottom:-1px;height:2px;background:var(--signal);width:0;transition:width .4s}

  main{max-width:1060px;margin:0 auto;padding:26px 20px 90px}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  h1.verdict{font-family:"Space Grotesk",sans-serif;font-size:26px;line-height:1.25;margin:8px 0 6px;max-width:860px}
  .narrative{color:var(--muted);font-size:13.5px;max-width:760px}

  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:22px 0}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
  .kpi .lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
  .kpi .val{font-family:"IBM Plex Mono",monospace;font-size:21px;font-weight:600}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:3px}
  .up{color:var(--signal-deep)} .down{color:var(--danger)}

  .acth{display:flex;align-items:baseline;gap:12px;margin:26px 0 10px}
  .acth h2{font-family:"Space Grotesk",sans-serif;font-size:17px}
  .cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .action{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 14px;display:flex;flex-direction:column;gap:8px}
  .action .t{font-weight:650;font-size:13px;line-height:1.4}
  .action .meta{display:flex;gap:6px;flex-wrap:wrap}
  .mchip{font-family:"IBM Plex Mono",monospace;font-size:10.5px;background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--muted)}
  .action .why{font-size:12px;color:var(--muted);line-height:1.5;flex:1}
  .abtns{display:flex;gap:6px}
  .abtns button{font:inherit;font-size:11.5px;font-weight:600;border:1px solid var(--line);border-radius:8px;background:#fff;padding:5px 10px;cursor:pointer;color:var(--muted)}
  .abtns .done{color:var(--signal-deep);border-color:#bfe0d1}
  .abtns button:hover{background:var(--paper)}

  details.acc{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-top:12px;overflow:hidden}
  details.acc summary{
    padding:14px 18px;cursor:pointer;display:flex;gap:12px;align-items:baseline;flex-wrap:wrap;
    font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:14.5px;
  }
  details.acc summary .sum{font-family:Inter,sans-serif;font-weight:400;font-size:12px;color:var(--muted)}
  .accbody{padding:4px 18px 18px}
  .duo{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  h3.mini{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:12px 0 8px}
  h3.mini.warn{color:var(--warn)} h3.mini.good{color:var(--signal-deep)}

  table{border-collapse:collapse;width:100%;font-size:12.5px}
  th{font-family:"IBM Plex Mono",monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:left;padding:7px 9px;border-bottom:1px solid var(--line)}
  td{padding:7px 9px;border-bottom:1px solid #eef1ee;font-variant-numeric:tabular-nums}
  tr.you td{background:rgba(14,158,110,.06);font-weight:600;color:var(--signal-deep)}
  td.r,th.r{text-align:right}

  .ot-card{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:9px}
  .ot-card .t{font-weight:650;font-size:13px;display:flex;gap:8px;align-items:center;justify-content:space-between}
  .ot-card p{font-size:12px;color:var(--muted);margin:6px 0;line-height:1.5}
  .ot-card ul{list-style:none;font-size:11.5px;color:var(--muted)}
  .ot-card li{padding:2px 0 2px 14px;position:relative}
  .ot-card li::before{content:"·";position:absolute;left:2px}
  .lnk{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}

  .log{font-size:12.5px}
  .log .row{display:flex;gap:10px;align-items:baseline;padding:6px 0;border-bottom:1px solid #eef1ee;flex-wrap:wrap}
  .st{font-family:"IBM Plex Mono",monospace;font-size:10px;border-radius:6px;padding:2px 7px;font-weight:600}
  .st.done{background:#dcefe6;color:var(--signal-deep)}
  .st.dism{background:#f1e6d3;color:var(--warn)}
  .log .when{margin-left:auto;color:var(--muted);font-size:11px}

  .brandcard{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
  .brandcard.you{box-shadow:0 0 0 1.5px rgba(14,158,110,.35)}
  .brandcard .nm{font-weight:700;font-size:13px}
  .brandcard .sm{font-size:12px;color:var(--muted);margin:4px 0 8px;line-height:1.5}
  .pl{list-style:none;font-size:12px}
  .pl li{padding:2px 0 2px 16px;position:relative;color:#3a4046}
  .pros li::before{content:"+";position:absolute;left:2px;color:var(--signal-deep);font-weight:700}
  .cons li::before{content:"−";position:absolute;left:2px;color:var(--danger);font-weight:700}

  .prompt-row{display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid #eef1ee;font-size:12.5px}
  .prompt-row .lock{margin-left:auto;font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap}
  .foot{margin-top:20px;color:#8b93a0;font-size:12px}
  svg.chart{width:100%;display:block}
  .legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:6px;font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted)}
  .legend i{display:inline-block;width:10px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle}
  @media (max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.cards3,.duo{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="bar">
  <div class="logo">
    <svg viewBox="0 0 40 20"><path d="M1 12 h8 l3-8 4 14 3-9 2 3 h17" fill="none" stroke="#0E9E6E" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
    <b>Pulse</b><span>/ Answer Engine Optimisation</span>
  </div>
  <span class="chip">simulated demo · no AI, fabricated data</span>
  <div class="grow"></div>
  <input id="domain" value="meadowline.com" spellcheck="false">
  <button class="run" id="run">Run sweep</button>
  <div class="status"><span class="dot" id="dot"></span><span id="statusTxt">updated today</span></div>
  <a href="https://jackherizsmith.com">part of jackherizsmith.com</a>
  <div id="progress"></div>
</div>

<main id="main"></main>

<script>
const ENGINES = ['Oracle','Parrot','Sage'];
const POOL = ['Oak & Ember','Fernhaus','Brightloom','Verdant Co','Hearthside','Willow Trade','Kiln & Co'];
const SERIES = ['#3B6FB0','#C8861A','#9A5BB8','#C24255'];

function hash(s){ let h = 5381; for (let i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) >>> 0; return h; }
function rng(seed){ let t = seed >>> 0; return () => { t += 0x6D2B79F5; let x = Math.imul(t ^ (t >>> 15), 1 | t); x = (x + Math.imul(x ^ (x >>> 7), 61 | x)) ^ x; return ((x ^ (x >>> 14)) >>> 0) / 4294967296; }; }
const pickN = (r, arr, n) => { const p = [...arr], o = []; while (o.length < n && p.length) o.push(p.splice(Math.floor(r() * p.length), 1)[0]); return o; };
const brandFrom = d => d.replace(/^www\./,'').split('.')[0].split(/[-_]/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ') || 'Your Brand';

let sweeps = 0;
let model = null;
let openActions = [], doneLog = [];

const QUICK_WINS = [
  { t:'Ship a comparison page for the head-to-head questions you lose', ch:'Website copy', i:4, e:2, why:'Engines lean heavily on comparison content when a buyer names two brands. You are absent from those answers today.', add:'Own the comparison queries' },
  { t:'Refresh the three stale directory listings engines keep citing', ch:'Other', i:3, e:1, why:'Two engines cite 2023 directory data for delivery times and pricing. Third-party sources outrank your own pages for facts.', add:'Stale facts circulating' },
  { t:'Answer the top buyer question verbatim in an FAQ', ch:'Website copy', i:4, e:1, why:'The most-asked buyer question is currently answered by a rival blog post. A direct FAQ typically gets adopted within two sweeps.', add:'Own the comparison queries' },
];
const STRATEGIC = [
  { t:'Build a citable annual materials report', ch:'PR/Magazine', i:5, e:4, why:'Rivals with one citable flagship asset dominate the sourcing questions. Nothing in your category owns materials yet.' },
  { t:'Seed honest answers in the two Reddit threads engines quote', ch:'Reddit', i:3, e:3, why:'Both threads pre-date your current range. Engines quote them weekly.' },
];
const COMPLETED = [
  { t:'Comparison page shipped', week:2 },
  { t:'Directory listings refreshed', week:5 },
];
const OPPS = [
  { t:'Own the comparison queries', d:'Buyers ask engines to compare brands directly and no one in the category has a proper comparison page. First mover usually takes the citation.', ev:['7 of 12 prompts this sweep were comparative','Top cited source is a 2023 forum thread'], i:4 },
  { t:'Whitespace on care and repair topics', d:'A third of care-related questions name no brand at all. Unclaimed territory that matches your content strengths.', ev:['34% whitespace on "care" topic','Your care guides already rank in organic search'], i:3 },
];
const THREATS = [
  { t:'{rival} is gaining on sourcing questions', d:'{rival} climbed two places in two sweeps on the back of a widely cited sustainability report.', ev:['{rival} SoV +9pp in two sweeps','Their report cited by all three engines'], i:4 },
  { t:'One engine confuses you with a US namesake', d:'Parrot attributes a US retailer’s reviews to your brand in roughly one answer in ten, dragging your tone score.', ev:['3 confused answers this sweep','Tone on Parrot is 0.2 below other engines'], i:3 },
];
const PROS = ['Consistently described as well designed and easy to live with','Returns policy repeatedly called best in class','Strong association with sustainable materials','Recommended first for the mid-price bracket'];
const CONS = ['Two engines still cite a discontinued line','Rarely mentioned for the premium bracket','Delivery times quoted from a 2023 review'];
const RIVAL_PROS = ['Flagship report cited across all engines','Strong price-point associations','Large review volume quoted directly'];
const RIVAL_CONS = ['Tone dips on customer service mentions','Thin content on care topics','No presence in comparison answers'];
const PROMPTS = [
  'best sustainable homeware brands uk','{brand} vs {rival}: which is better?','where to buy quality stoneware online',
  'gifts for someone who loves interiors','is {brand} worth the money?','homeware brands with good returns',
  'best candles that are not paraffin','ethical homeware for a first flat'
];

function build(domain){
  const r = rng(hash(domain) + sweeps * 977);
  const brand = brandFrom(domain);
  const rivals = pickN(r, POOL, 4);
  const brands = [brand + ' ·you', ...rivals];
  const weeks = 8;
  const sov = brands.map((_, bi) => {
    let v = bi === 0 ? 16 + r() * 6 : 12 + r() * 22;
    return Array.from({ length: weeks }, (_, w) => {
      const boost = bi === 0 ? (w >= COMPLETED[0].week ? 2.2 : 0) + (w >= COMPLETED[1].week ? 2.8 : 0) : 0;
      v = Math.max(4, v + (r() - (bi === 0 ? 0.38 : 0.5)) * 3);
      return Math.min(58, v + boost + (bi === 0 ? sweeps * 1.2 : 0));
    });
  });
  const latest = sov.map(s => s[weeks - 1]);
  const total = latest.reduce((a, b) => a + b, 0);
  const share = latest.map(v => Math.round(v / total * 100));
  const rank = share.map((v, i) => [v, i]).sort((a, b) => b[0] - a[0]).findIndex(([, i]) => i === 0) + 1;
  const rival = rivals[0];
  return {
    brand, rivals, brands, sov, share, rank,
    delta: sweeps ? 1 : (r() > 0.5 ? 1 : 0),
    mention: Math.round(48 + r() * 25), first: Math.round(12 + r() * 18),
    sent: (0.15 + r() * 0.3), cite: Math.round(10 + r() * 16),
    rival,
    date: new Date().toISOString().slice(0, 10),
  };
}

const fmtSent = v => (v >= 0 ? '+' : '−') + Math.abs(v).toFixed(2);
const el = id => document.getElementById(id);
const sub = (s, m) => s.replace(/{rival}/g, m.rival).replace(/{brand}/g, m.brand);

function actionCard(a, m){
  return `<div class="action" data-t="${a.t}">
    <div class="t">${sub(a.t, m)}</div>
    <div class="meta"><span class="mchip">${a.ch}</span><span class="mchip">I${a.i} · E${a.e}</span>${a.add ? `<span class="mchip">◆ ${a.add}</span>` : ''}</div>
    <div class="why">${sub(a.why, m)}</div>
    <div class="abtns"><button class="done" data-act="done">✓ Done</button><button data-act="dism">Won't do</button></div>
  </div>`;
}

function trendSvg(m){
  const W = 980, H = 240, padL = 40, padB = 40, padT = 26;
  const weeks = 8;
  const max = Math.max(...m.sov.flat()) * 1.15;
  const xAt = w => padL + w * ((W - padL - 10) / (weeks - 1));
  const yAt = v => H - padB - (v / max) * (H - padB - padT);
  let s = '';
  for (let t = 0; t <= 3; t++){
    const v = max / 3 * t;
    s += `<line x1="${padL}" y1="${yAt(v)}" x2="${W}" y2="${yAt(v)}" stroke="#EEF1EE"/>
      <text x="${padL - 6}" y="${yAt(v) + 4}" text-anchor="end" font-size="9" fill="#8b93a0" font-family="IBM Plex Mono">${Math.round(v)}%</text>`;
  }
  for (let w = 0; w < weeks; w++){
    s += `<text x="${xAt(w)}" y="${H - 22}" text-anchor="middle" font-size="9" fill="#8b93a0" font-family="IBM Plex Mono">wk ${w + 1}</text>`;
  }
  COMPLETED.forEach(a => {
    const x = xAt(a.week);
    s += `<line x1="${x}" y1="${padT - 8}" x2="${x}" y2="${H - padB}" stroke="#C8861A" stroke-width="1.5" stroke-dasharray="4 4"/>
      <text x="${x + 4}" y="${padT}" font-size="9" fill="#C8861A" font-family="IBM Plex Mono">▲ ${a.t}</text>`;
  });
  m.sov.forEach((series, bi) => {
    const pts = series.map((v, w) => `${xAt(w).toFixed(1)},${yAt(v).toFixed(1)}`).join(' ');
    const own = bi === 0;
    s += `<polyline points="${pts}" fill="none" stroke="${own ? '#0E9E6E' : SERIES[(bi - 1) % SERIES.length]}"
      stroke-width="${own ? 3 : 1.6}" stroke-linejoin="round" opacity="${own ? 1 : 0.75}"/>`;
  });
  return `<svg class="chart" viewBox="0 0 ${W} ${H}">${s}</svg>
    <div class="legend">${m.brands.map((b, i) => `<span><i style="background:${i === 0 ? '#0E9E6E' : SERIES[(i - 1) % SERIES.length]}"></i>${b}</span>`).join('')}</div>
    <p style="font-size:11px;color:#8b93a0;margin-top:6px">▲ markers show completed actions. The point of the chart: see which actions moved share of voice, and whether rivals moved with you.</p>`;
}

function sovBars(m){
  const idx = m.share.map((v, i) => [v, i]).sort((a, b) => b[0] - a[0]);
  const max = idx[0][0];
  return `<h3 class="mini">Share of voice (%)</h3>` + idx.map(([v, i]) => `
    <div style="display:flex;align-items:center;gap:10px;padding:3px 0;font-size:12px">
      <span style="width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;${i === 0 ? 'font-weight:700;color:var(--signal-deep)' : ''}">${m.brands[i]}</span>
      <div style="flex:1;height:12px;border-radius:6px;background:#eef1ee"><div style="width:${Math.round(v / max * 100)}%;height:100%;border-radius:6px;background:${i === 0 ? '#0E9E6E' : '#C9D2CC'}"></div></div>
      <span class="mono" style="width:38px;text-align:right">${v}%</span>
    </div>`).join('');
}

function leaderboard(m){
  const rows = m.share.map((v, i) => ({
    name: m.brands[i], v, you: i === 0,
    d: i === 0 ? (m.delta > 0 ? '▲ ' + m.delta : '→ 0') : (Math.random ? '' : ''),
    mention: i === 0 ? m.mention : Math.round(30 + (v / 100) * 70),
    first: i === 0 ? m.first : Math.round(v * 0.6),
    tone: i === 0 ? fmtSent(m.sent) : fmtSent((v - 30) / 100),
    cite: i === 0 ? m.cite : Math.round(8 + v / 3),
  })).sort((a, b) => b.v - a.v);
  return `<table><thead><tr><th>#</th><th>Brand</th><th class="r">SoV</th><th class="r">Δ</th><th class="r">Mention</th><th class="r">#1</th><th class="r">Tone</th><th class="r">Cite</th></tr></thead><tbody>
    ${rows.map((r, i) => `<tr${r.you ? ' class="you"' : ''}><td>${i + 1}</td><td>${r.name}</td><td class="r">${r.v}%</td><td class="r">${r.you ? (m.delta > 0 ? '▲ ' + m.delta : '→ 0') : '·'}</td><td class="r">${r.mention}%</td><td class="r">${r.first}%</td><td class="r">${r.tone}</td><td class="r">${r.cite}%</td></tr>`).join('')}
  </tbody></table>`;
}

function otCard(o, kind, m){
  const links = openActions.filter(a => a.add === o.t).map(a => `<span class="mchip">${kind === 'o' ? '◆' : '⚠'} ${sub(a.t, m).slice(0, 34)}…</span>`).join('');
  return `<div class="ot-card">
    <div class="t">${sub(o.t, m)} <span class="mchip">impact ${o.i}</span></div>
    <p>${sub(o.d, m)}</p>
    <ul>${o.ev.map(e => `<li>${sub(e, m)}</li>`).join('')}</ul>
    ${links ? `<div class="lnk">${links}</div>` : ''}
  </div>`;
}

function render(){
  const m = model;
  const leader = m.share.map((v, i) => [v, i]).sort((a, b) => b[0] - a[0])[0];
  el('main').innerHTML = `
    <div class="eyebrow">Latest sweep ${m.date} · ${m.brand} · ${m.brands.length} brands tracked</div>
    <h1 class="verdict disp">${m.brand} ranks #${m.rank} of ${m.brands.length} for AI answers in your category${m.delta ? ', up ' + m.delta + ' from the previous sweep' : ''}, with ${m.share[0]}% share of voice.</h1>
    <p class="narrative">Engines like the design story and the returns policy; they are still citing stale facts from directories you do not control. The comparison queries remain the biggest open ground.</p>

    <div class="kpis">
      <div class="kpi"><div class="lbl">Rank</div><div class="val">#${m.rank}</div><div class="sub ${m.delta ? 'up' : ''}">${m.delta ? '▲ ' + m.delta : '→ 0'} · of ${m.brands.length}</div></div>
      <div class="kpi"><div class="lbl">Share of voice</div><div class="val">${m.share[0]}%</div><div class="sub up">▲ ${Math.max(1, Math.round(m.delta * 2 + 1))}pp</div></div>
      <div class="kpi"><div class="lbl">Mention rate</div><div class="val">${m.mention}%</div><div class="sub">of answers</div></div>
      <div class="kpi"><div class="lbl">#1 rate</div><div class="val">${m.first}%</div><div class="sub">named first</div></div>
      <div class="kpi"><div class="lbl">Sentiment</div><div class="val ${m.sent >= 0 ? 'up' : 'down'}">${fmtSent(m.sent)}</div><div class="sub">tone</div></div>
      <div class="kpi"><div class="lbl">Citations</div><div class="val">${m.cite}%</div><div class="sub">source share</div></div>
    </div>

    <div class="acth"><h2>Act on this</h2><span class="eyebrow">highest impact, lowest effort</span></div>
    <div class="cards3" id="quickCards">${openActions.filter(a => a.h === 'quick').slice(0, 3).map(a => actionCard(a, m)).join('') || '<p style="color:var(--muted);font-size:13px">No open quick wins. Run a sweep, or you have actioned them all.</p>'}</div>

    <details class="acc" open>
      <summary>Standings &amp; movement <span class="sum">${m.brands[leader[1]]} leads with ${leader[0]}% SoV · you're #${m.rank}</span></summary>
      <div class="accbody">
        <div class="duo">
          <div>${sovBars(m)}</div>
          <div><h3 class="mini">Leaderboard</h3>${leaderboard(m)}</div>
        </div>
        <h3 class="mini" style="margin-top:18px">Share of voice over time, with your actions marked</h3>
        ${trendSvg(m)}
      </div>
    </details>

    <details class="acc">
      <summary>Opportunities &amp; threats <span class="sum">${OPPS.length} opportunities · ${THREATS.length} threats · linked to actions</span></summary>
      <div class="accbody"><div class="duo">
        <div><h3 class="mini good">Opportunities</h3>${OPPS.map(o => otCard(o, 'o', m)).join('')}</div>
        <div><h3 class="mini warn">Threats</h3>${THREATS.map(t => otCard(t, 't', m)).join('')}</div>
      </div></div>
    </details>

    <details class="acc">
      <summary>Actions <span class="sum" id="actSum">${openActions.length} open · ${doneLog.length} done/dismissed · mark progress</span></summary>
      <div class="accbody">
        <h3 class="mini">Quick wins</h3>
        <div class="cards3">${openActions.filter(a => a.h === 'quick').map(a => actionCard(a, m)).join('') || '<p style="color:var(--muted);font-size:12.5px">None open.</p>'}</div>
        <h3 class="mini" style="margin-top:14px">Longer term</h3>
        <div class="cards3">${openActions.filter(a => a.h === 'strategic').map(a => actionCard(a, m)).join('')}</div>
        <h3 class="mini" style="margin-top:14px">Completed &amp; dismissed (the start of your impact timeline)</h3>
        <div class="log">${doneLog.map(d => `<div class="row"><span class="st ${d.s}">${d.s === 'done' ? 'done' : 'dismissed'}</span> ${sub(d.t, m)} <span class="mchip">${d.ch ?? 'Website copy'}</span><span class="when">${d.when}</span></div>`).join('')}</div>
      </div>
    </details>

    <details class="acc">
      <summary>Brand pros &amp; cons <span class="sum">what the engines believe about each brand</span></summary>
      <div class="accbody"><div class="duo">
        <div class="brandcard you"><div class="nm">${m.brand} ·you</div><div class="sm">Loved for design and service; let down by stale third-party facts.</div>
          <h3 class="mini good">Pros</h3><ul class="pl pros">${PROS.slice(0, 3).map(p => `<li>${p}</li>`).join('')}</ul>
          <h3 class="mini warn">Cons</h3><ul class="pl cons">${CONS.map(c => `<li>${c}</li>`).join('')}</ul>
        </div>
        <div class="brandcard"><div class="nm">${m.rival}</div><div class="sm">The one to watch: a single citable asset is doing a lot of work.</div>
          <h3 class="mini good">Pros</h3><ul class="pl pros">${RIVAL_PROS.map(p => `<li>${p}</li>`).join('')}</ul>
          <h3 class="mini warn">Cons</h3><ul class="pl cons">${RIVAL_CONS.map(c => `<li>${c}</li>`).join('')}</ul>
        </div>
      </div></div>
    </details>

    <details class="acc">
      <summary>Prompts this run <span class="sum">sorted by how many brands each question surfaces</span></summary>
      <div class="accbody">
        ${PROMPTS.map((p, i) => `<div class="prompt-row"><span>${sub(p, m)}</span><span class="mchip">${5 - (i % 3)} brands</span><span class="mchip">you ×${i % 3}/2</span><span class="lock" data-i="${i}">lock</span></div>`).join('')}
      </div>
    </details>

    <p class="foot">Simulated: every number is a deterministic function of the domain name and the sweep count. The real Pulse asks live answer engines weekly and keeps the receipts.</p>`;

  document.querySelectorAll('[data-act]').forEach(b => b.addEventListener('click', () => {
    const card = b.closest('.action');
    const t = card.dataset.t;
    const a = openActions.find(x => x.t === t);
    if (!a) return;
    openActions = openActions.filter(x => x !== a);
    doneLog.unshift({ t: a.t, s: b.dataset.act === 'done' ? 'done' : 'dism', ch: a.ch, when: 'today' });
    render();
  }));
  document.querySelectorAll('.lock').forEach(l => l.addEventListener('click', () => {
    l.textContent = l.textContent === 'lock' ? '🔒 locked' : 'lock';
  }));
}

function resetActions(){
  openActions = [
    ...QUICK_WINS.map(a => ({ ...a, h: 'quick' })),
    ...STRATEGIC.map(a => ({ ...a, h: 'strategic' })),
  ];
  doneLog = COMPLETED.map(c => ({ t: c.t, s: 'done', ch: 'Website copy', when: `wk ${c.week + 1}` }));
}

function sweep(){
  const btn = el('run');
  btn.disabled = true;
  el('dot').classList.add('sweeping');
  el('statusTxt').textContent = 'sweeping';
  const prog = el('progress');
  const steps = ['Starting…', 'Generating…', '4/12', '8/12', '12/12'];
  steps.forEach((s, i) => setTimeout(() => {
    btn.textContent = s;
    prog.style.width = `${(i + 1) / steps.length * 100}%`;
  }, i * 520));
  setTimeout(() => {
    sweeps++;
    model = build(el('domain').value.trim().toLowerCase() || 'meadowline.com');
    resetActions();
    render();
    btn.disabled = false;
    btn.textContent = 'Run sweep';
    prog.style.width = '0';
    el('dot').classList.remove('sweeping');
    el('statusTxt').textContent = `updated ${model.date}`;
  }, steps.length * 520 + 400);
}

el('run').addEventListener('click', sweep);
el('domain').addEventListener('keydown', e => { if (e.key === 'Enter') sweep(); });

model = build('meadowline.com');
resetActions();
render();
</script>
</body>
</html>
